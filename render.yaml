services:
  - type: web
    name: visionguard-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FRONTEND_URL
        value: https://visionguard-frontend.onrender.com
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
      - key: PYTHONUNBUFFERED
        value: 1

  - type: web
    name: visionguard-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://visionguard-backend.onrender.com/api
      - key: VITE_WS_URL
        value: https://visionguard-backend.onrender.com/ws
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
