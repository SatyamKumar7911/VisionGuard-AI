spring:
  datasource:
    url: jdbc:h2:file:./data/visionguard
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

frontend:
  url: ${FRONTEND_URL}

logging:
  file:
    name: ./logs/application.log
  level:
    root: INFO
    com.visionguard: INFO
    org.springframework.web: INFO
    org.springframework.web.socket: INFO
