version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - ai-engine

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
